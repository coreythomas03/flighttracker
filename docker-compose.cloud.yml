# Production / cloud VM override.
# Usage on VM: docker compose --env-file .env.prod -f docker-compose.yml -f docker-compose.cloud.yml up -d --build
# On the VM, copy .env.prod.example to .env.prod and set strong production values.
# - Binds MySQL to localhost only so DB is not exposed on the public network.
# - Backend reaches MySQL via internal Docker network (hostname: mysql).
# - restart: unless-stopped so containers come back after VM reboot.

services:
  mysql:
    env_file: .env.prod
    ports:
      - "127.0.0.1:3306:3306"
    restart: unless-stopped
    # Schema is managed by Flyway in the backend (runs on app startup). No Docker init script.

  backend:
    env_file: .env.prod
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
