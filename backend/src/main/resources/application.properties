spring.application.name=backend

spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Flyway: versioned schema migrations run on startup (industry standard)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Ingestion: delay between teams (ms) when doing full refresh (rate limit)
ingestion.delay-between-teams-ms=12000
# Ingestion: path for flight_refresh.log; Docker overrides via INGESTION_LOG_PATH
ingestion.log-path=${INGESTION_LOG_PATH:database/flight_refresh.log}

# Scheduling: cron (second minute hour day month weekday). Full refresh every 2h at :00; flying at :05,:15,:25,:35,:45,:55 (never at :00)
ingestion.full-refresh-cron=0 0 */2 * * *
ingestion.flying-refresh-cron=0 5,15,25,35,45,55 * * * *
